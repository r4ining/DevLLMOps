# ==================== 限流 Zone 定义（分组） ====================

# 10r/s 分组（每秒 10 个请求）
limit_req_zone $key_10r zone=group_10r:30m rate=10r/s;

# 20r/s 分组（每秒 20 个请求）
limit_req_zone $key_20r zone=group_20r:30m rate=20r/s;

# 以后需要新增分组时，只需在这里添加，例如：
# limit_req_zone $key_50r zone=group_50r:30m rate=50r/s;



# ==================== Token 分组映射 ====================

# 10r/s 分组的 Token 映射
map $http_authorization $key_10r {
    default "";
    include /etc/nginx/new-api-rate-limit/rate-limit-10rps.conf;
}

# 20r/s 分组的 Token 映射
map $http_authorization $key_20r {
    default "";
    include /etc/nginx/new-api-rate-limit/rate-limit-20rps.conf;
}


