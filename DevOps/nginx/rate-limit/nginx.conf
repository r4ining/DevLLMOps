http {
    # ==================== 引入速率相关配置（全部放在 new-api-rate-limit 目录） ====================
    include /etc/nginx/new-api-rate-limit/rate-limit-zone-map.conf;

    server {
        listen 80;
        server_name localhost;           # 测试时可改为 your.domain.com

        location /hello {
            # ==================== 限流配置 ====================
            limit_req zone=group_10r burst=10 nodelay;
            limit_req zone=group_20r burst=20 nodelay;

            limit_req_status 429;

            # ==================== 返回 hello ====================
            # 如果直接 return，限流将不会触发，proxy_pass 可以触发限流
            proxy_pass http://backend;   # 这里可以改成你的实际后端服务地址
            # return 200 'hello\n';

            # 如果你想返回 JSON 格式，可以改成下面这行：
            # return 200 '{"message": "hello"}';
        }

        location /v1/ {                  # ← 根据实际 API 路径修改，例如 /api/ 或 /
            # 应用各分组限流（未匹配的 Token 自动不限流）
            limit_req zone=group_10r burst=20 nodelay;
            limit_req zone=group_20r burst=40 nodelay;

            # ------------------- 并发限制（只对指定 key 生效） -------------------
            limit_conn conn_auth_500 500;

            limit_req_status 429;
            limit_conn_status 429;

            # 反向代理设置
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;   # 必须透传
        }

        # 自定义 429 错误页面
        error_page 429 /429.html;
        location = /429.html {
            internal;
            return 429 'Too Many Requests - Rate limit exceeded for this API key.\n';
            add_header Content-Type text/plain always;
        }
    }
}