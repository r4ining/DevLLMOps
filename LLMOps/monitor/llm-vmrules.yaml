    - name: llm-availability
      rules:
        - alert: LLMServiceDown
          expr: up{job="llm"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "LLM 推理服务宕机"
            description: "实例 {{ $labels.instance }} 已停止响应超过 1 分钟。"

